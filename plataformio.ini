; PlatformIO - firmware da prova de conceito 
; ESP32 como broker MQTT local + cliente Tor (saida via SOCKS5/toresp32). 
; 
; IMPORTANTE: o Tor (toresp32) exige um ESP32 com PSRAM. Os ambientes abaixo 
; usam por padrao a ESP-WROVER-KIT (4 MB PSRAM). Para ESP32-S3 com PSRAM, 
; troque "board" por "esp32-s3-devkitc-1" e ajuste o tipo de PSRAM. 

[platformio] 
default_envs = integrated 

[env] platform = espressif32 
board = esp-wrover-kit 
framework = arduino 
monitor_speed = 115200 
build_unflags = -std=gnu++11 
build_flags = 
    -std=gnu++17 
    -DBOARD_HAS_PSRAM 
    -DCORE_DEBUG_LEVEL=3 
board_build.partitions = huge_app.csv 
lib_deps = 
    mlesniew/PicoMQTT @ ^1.3.0 
    bblanchon/ArduinoJson @ ^7.0.0 
; --- Fase 2: somente broker local recebendo JSON de sensores --- 
[env:broker_only] 
build_flags = 
    ${env.build_flags} 
    -DMODE_BROKER_ONLY 

; --- Fase 3: teste do wrapper SOCKS5 contra o Tor local --- 
[env:socks_test] 
build_flags = 
    ${env.build_flags} 
    -DMODE_SOCKS_TEST 
    
; --- Fase 4: integrado (broker local + ponte de saida via Tor) --- 
[env:integrated] 
build_flags = 
    ${env.build_flags} 
    -DMODE_INTEGRATED